<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="logo.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:title" content="GEAK智慧云NAS-藏在时光里的幸福，我们一起守护">
    <meta property="og:description" content="GEAK智慧云NAS-藏在时光里的幸福，我们一起守护">
    <meta property="og:image" content="https://www.yomtime.com/assets/icon-DH4bA27c.png">
    <meta name="twitter:card" content="https://www.yomtime.com/assets/icon-DH4bA27c.png">
    <meta name="twitter:image" content="https://www.yomtime.com/assets/icon-DH4bA27c.png">
    <meta name="keywords" content="GEAK,智慧云NAS,云NAS,云存储">
    <title>猫品安 | CATPA - 系统维护中</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
        }

        a, a:hover {
            text-decoration: none;
            color: #fff;
        }

        .maintenance-container {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a1a1a, #2d2d2d);
            padding: 20px;
            color: #fff;
            z-index: 9999;
        }

        .maintenance-content {
            max-width: 600px;
            width: 100%;
            text-align: center;
            animation: fadeIn .8s ease-in;
        }

        @keyframes fadeIn {
            0% {
                opacity: 0;
                transform: translateY(-20px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .maintenance-icon {
            width: 120px;
            height: 120px;
            margin: 0 auto 40px;
            color: #4a9eff;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.8;
                transform: scale(1.05);
            }
        }

        .maintenance-icon svg {
            width: 100%;
            height: 100%;
        }

        .maintenance-title {
            font-size: 48px;
            font-weight: 700;
            margin: 0 0 24px;
            color: #fff;
            letter-spacing: 1px;
        }

        .maintenance-description {
            font-size: 18px;
            line-height: 1.6;
            margin: 0 0 16px;
            color: #ccc;
        }

        .maintenance-tips {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 24px;
            margin: 0 0 40px;
            text-align: left;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .tips-title {
            font-size: 18px;
            font-weight: 600;
            margin: 0 0 16px;
            color: #4a9eff;
        }

        .tips-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .tips-list li {
            font-size: 16px;
            line-height: 1.8;
            color: #ccc;
            margin: 8px 0;
            padding-left: 8px;
        }

        .tips-list li::before {
            content: "•";
            color: #4a9eff;
            font-weight: bold;
            display: inline-block;
            width: 1em;
            margin-left: -1em;
        }

        .maintenance-footer {
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 24px;
        }

        .footer-text {
            font-size: 16px;
            color: #999;
            margin: 0;
            line-height: 1.6;
        }

        .countdown {
            font-size: 24px;
            color: #4a9eff;
            font-weight: 600;
            margin: 20px 0;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
            margin: 20px 0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4a9eff, #67c23a);
            border-radius: 3px;
            animation: progress 3s ease-in-out infinite;
            width: 70%;
        }

        @keyframes progress {
            0% {
                width: 30%;
            }
            50% {
                width: 80%;
            }
            100% {
                width: 30%;
            }
        }

        @media (max-width: 768px) {
            .maintenance-title {
                font-size: 36px;
            }
            .maintenance-description {
                font-size: 16px;
            }
            .maintenance-icon {
                width: 100px;
                height: 100px;
                margin-bottom: 32px;
            }
            .maintenance-tips {
                padding: 20px;
            }
            .tips-title {
                font-size: 16px;
            }
            .tips-list li {
                font-size: 14px;
            }
        }

        @media (max-width: 480px) {
            .maintenance-title {
                font-size: 28px;
            }
            .maintenance-description {
                font-size: 14px;
            }
            .maintenance-icon {
                width: 80px;
                height: 80px;
                margin-bottom: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="maintenance-container">
        <div class="maintenance-content">
            <!-- 维护图标 -->
            <div class="maintenance-icon">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2L2 7V17L12 22L22 17V7L12 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                    <path d="M12 22V12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M12 12L2 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M12 12L22 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <circle cx="12" cy="12" r="3" fill="currentColor" opacity="0.3"/>
                </svg>
            </div>

            <!-- 标题 -->
            <h1 class="maintenance-title">系统维护中</h1>

            <!-- 描述 -->
            <p class="maintenance-description">
                猫品安 | CATPA正在进行系统升级维护<br>
                预计很快恢复，感谢您的耐心等待
            </p>

            <!-- 进度条 -->
            <div class="progress-bar">
                <div class="progress-fill"></div>
            </div>

            <!-- 提示信息 -->
            <div class="maintenance-tips">
                <h3 class="tips-title">温馨提示</h3>
                <ul class="tips-list">
                    <li>维护期间，您可能无法正常访问系统服务</li>
                    <li>您的数据安全已妥善保管，请勿担心</li>
                    <li>如需紧急帮助，请联系客服支持</li>
                    <li>我们会尽快完成维护，恢复正常访问</li>
                </ul>
            </div>

            <!-- 页脚 -->
            <div class="maintenance-footer">
                <p class="footer-text">
                    安心科技，品质生活<br>
                    © 2026 猫品安 | CATPA 版权所有
                </p>
            </div>
        </div>
    </div>
</body>
</html>
